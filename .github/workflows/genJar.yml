name: Spider Jar Gen CI & Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_RUNNER_DEBUG: false
      ACTIONS_STEP_DEBUG: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./buildAndGenJar.bat ec

      - name: Update spider jar
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: 'update spider jar'
          add: './jar/custom_spider.jar ./jar/custom_spider.jar.md5'
          push: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version
        run: echo "VERSION=v$(Get-Date -Format 'yyyyMMdd')" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Check tag
        run: |
          git tag | FindStr $env:VERSION > $null
          if ($LASTEXITCODE -eq 0) { echo "TAG_EXISTS=true" >> $env:GITHUB_ENV }
          else { echo "TAG_EXISTS=false" >> $env:GITHUB_ENV }
        shell: pwsh

      - name: Create Release
        if: env.TAG_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Spider Jar ${{ env.VERSION }}
          body: 自动构建发布
          files: |
            jar/custom_spider.jar
            jar/custom_spider.jar.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
